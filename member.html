<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mon Sanctuaire — Sankhtuhair</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Georgia, serif;
      background: #fdf9f4;
      color: #3d2b1f;
      min-height: 100vh;
    }
    .loading-screen {
      position: fixed; inset: 0;
      background: #fdf9f4;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 100;
    }
    .loading-screen p { color: #8b6f5e; font-size: 1.1rem; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e8d5c4;
      border-top-color: #3d2b1f;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-screen {
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 16px; text-align: center; padding: 40px;
    }
    .error-screen h2 { font-size: 1.4rem; }
    .error-screen p { color: #8b6f5e; }
    .error-screen a {
      margin-top: 8px; color: #3d2b1f;
      text-decoration: underline; font-size: 0.95rem;
    }
    .member-space {
      display: none;
      max-width: 720px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .header { text-align: center; margin-bottom: 48px; }
    .header img { height: 60px; margin-bottom: 16px; }
    .header h1 { font-size: 1.8rem; margin-bottom: 8px; }
    .header p { color: #8b6f5e; font-size: 1rem; }
    .section {
      background: white;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(61,43,31,0.07);
    }
    .section h2 {
      font-size: 1.2rem;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0e4d8;
    }
    textarea {
      width: 100%; min-height: 120px;
      border: 1px solid #e8d5c4;
      border-radius: 10px; padding: 14px;
      font-family: Georgia, serif; font-size: 0.95rem;
      color: #3d2b1f; background: #fdf9f4;
      resize: vertical; outline: none;
    }
    textarea:focus { border-color: #3d2b1f; }
    .btn {
      display: inline-block; margin-top: 16px;
      padding: 12px 28px;
      background: #3d2b1f; color: white;
      border: none; border-radius: 8px;
      font-family: Georgia, serif; font-size: 1rem;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result {
      margin-top: 20px; padding: 20px;
      background: #fdf9f4; border-radius: 10px;
      line-height: 1.8; font-size: 0.95rem;
      display: none; white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <p>Ouverture de ton sanctuaire…</p>
  </div>

  <div class="error-screen" id="errorScreen">
    <h2>🌿 Lien invalide ou expiré</h2>
    <p>Ce lien a déjà été utilisé ou a expiré après 15 minutes.</p>
    <a href="/">← Retourner à l'accueil</a>
  </div>

  <div class="member-space" id="memberSpace">
    <div class="header">
      <img src="https://raw.githubusercontent.com/Seanamon0/Sanktuhair/main/logo" alt="Sankhtuhair" />
      <h1>Ton Sanctuaire 🌿</h1>
      <p id="welcomeEmail"></p>
    </div>

    <!-- Diagnostic -->
    <div class="section">
      <h2>✨ Diagnostic Capillaire</h2>
      <textarea id="diagInput" placeholder="Décris tes cheveux, tes problèmes, tes habitudes… Plus tu es précise, plus le diagnostic sera juste."></textarea>
      <button class="btn" id="diagBtn">Obtenir mon diagnostic</button>
      <div class="result" id="diagResult"></div>
    </div>

    <!-- Agenda -->
    <div class="section">
      <h2>📅 Mon Agenda Capillaire</h2>
      <textarea id="agendaInput" placeholder="Décris ton quotidien, ton type de cheveux, combien de temps tu peux consacrer à ta routine…"></textarea>
      <button class="btn" id="agendaBtn">Générer mon agenda</button>
      <div class="result" id="agendaResult"></div>
    </div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    async function init() {
      if (!token) return showError();

      try {
        const res = await fetch(`/api/get-member?token=${token}`);
        const data = await res.json();

        if (!res.ok || !data.email) return showError();

        document.getElementById('welcomeEmail').textContent = `Bienvenue, ${data.email} 💛`;
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('memberSpace').style.display = 'block';

      } catch {
        showError();
      }
    }

    function showError() {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('errorScreen').style.display = 'flex';
    }

    // Diagnostic
    document.getElementById('diagBtn').addEventListener('click', async () => {
      const input = document.getElementById('diagInput').value.trim();
      if (!input) return;
      const btn = document.getElementById('diagBtn');
      const result = document.getElementById('diagResult');
      btn.disabled = true;
      btn.textContent = 'Analyse en cours…';
      result.style.display = 'none';

      const res = await fetch('/api/diagnose', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: input })
      });
      const data = await res.json();
      result.textContent = data.result || data.error;
      result.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Obtenir mon diagnostic';
    });

    // Agenda
    document.getElementById('agendaBtn').addEventListener('click', async () => {
      const input = document.getElementById('agendaInput').value.trim();
      if (!input) return;
      const btn = document.getElementById('agendaBtn');
      const result = document.getElementById('agendaResult');
      btn.disabled = true;
      btn.textContent = 'Génération en cours…';
      result.style.display = 'none';

      const res = await fetch('/api/agenda', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ description: input })
      });
      const data = await res.json();
      result.textContent = data.result || data.error;
      result.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Générer mon agenda';
    });

    init();
  </script>
</body>
</html>
