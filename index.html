<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sankhtuhair — Sanctuaire de ta Couronne</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0F2922;--bdc:#172f25;--bdp:#0a1f18;--bmd:#0e2820;
      --or:#c9a96e;--orl:#e8c98a;--ord:rgba(201,169,110,.35);
      --tx:#e8dcc8;--txs:rgba(232,220,200,.82);--txm:rgba(232,220,200,.55);
      --bo:rgba(201,169,110,.22);--ok:#5ecb8a;
      --rp:50px;--rc:18px;--rs:10px;--tr:.3s cubic-bezier(.4,0,.2,1)
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    .lbl{font-size:.67rem;letter-spacing:.4em;text-transform:uppercase;color:var(--or)}
    .reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
    .reveal.in{opacity:1;transform:translateY(0)}
    .stagger>*{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease}
    .stagger.in>*:nth-child(1){opacity:1;transform:translateY(0)}
    .stagger.in>*:nth-child(2){opacity:1;transform:translateY(0);transition-delay:.12s}
    .stagger.in>*:nth-child(3){opacity:1;transform:translateY(0);transition-delay:.24s}

    nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(14px);background:rgba(14,40,32,.88);border-bottom:1px solid var(--bo)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--or);letter-spacing:.12em}
    .btn-nav{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--or);background:transparent;border:1.5px solid var(--ord);border-radius:var(--rp);padding:.55rem 1.4rem;cursor:pointer;transition:all var(--tr)}
    .btn-nav:hover{background:var(--or);color:var(--bg)}

    .hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7rem 1.5rem 4rem;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 50% 45%,rgba(201,169,110,.09) 0%,transparent 70%);pointer-events:none}
    .bot{position:absolute;pointer-events:none}
    .hero-ey{font-size:.67rem;letter-spacing:.42em;text-transform:uppercase;color:var(--or);margin-bottom:1.2rem;opacity:0;animation:fadeUp .8s ease .3s forwards}
    .hero-crown{font-size:clamp(2.5rem,6vw,4rem);color:var(--or);filter:drop-shadow(0 0 22px rgba(201,169,110,.4));display:block;margin-bottom:1.2rem;animation:floatC 5s ease-in-out infinite,fadeIn 1s ease .1s both}
    @keyframes floatC{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,15vw,9.5rem);font-weight:300;line-height:.95;letter-spacing:.06em;opacity:0;animation:fadeUp .9s ease .5s forwards}
    .hero-title .ac{color:var(--or);font-style:italic}
    .hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,3.5vw,1.4rem);font-style:italic;font-weight:300;color:var(--txm);max-width:460px;margin:1.4rem auto 2.8rem;opacity:0;animation:fadeUp .9s ease .7s forwards}
    .hero-cta{opacity:0;animation:fadeUp .9s ease .9s forwards;display:flex;flex-direction:column;align-items:center;gap:1rem}
    .scroll-h{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;opacity:0;animation:fadeIn 1s ease 1.8s forwards}
    .scroll-h span{font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,169,110,.4)}
    .scroll-l{width:1px;height:44px;background:linear-gradient(to bottom,var(--or),transparent);animation:sP 2.5s ease-in-out infinite}
    @keyframes sP{0%,100%{opacity:.25}50%{opacity:.9}}

    .music-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:150;width:44px;height:44px;border-radius:50%;background:rgba(14,40,32,.92);border:1px solid var(--bo);color:var(--or);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr);backdrop-filter:blur(10px)}
    .music-btn:hover{border-color:var(--ord);transform:scale(1.1)}

    .btn-gold{display:inline-flex;align-items:center;gap:.5rem;padding:1.1rem 2.8rem;background:linear-gradient(135deg,#c9a96e,#b8924a);color:#0F2922;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;border:none;border-radius:var(--rp);cursor:pointer;transition:all var(--tr);box-shadow:0 6px 28px rgba(201,169,110,.25)}
    .btn-gold:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(201,169,110,.4)}
    .btn-ghost{display:inline-flex;align-items:center;gap:.5rem;padding:.95rem 2.4rem;background:transparent;color:var(--or);font-family:'DM Sans',sans-serif;font-size:.8rem;letter-spacing:.16em;text-transform:uppercase;border:1.5px solid var(--ord);border-radius:var(--rp);cursor:pointer;transition:all var(--tr);text-decoration:none}
    .btn-ghost:hover{border-color:var(--or);color:var(--orl);background:rgba(201,169,110,.06)}

    .manifeste{padding:9rem 1.5rem;background:var(--bdp);position:relative;overflow:hidden}
    .manifeste::before{content:'\275D';position:absolute;top:-2rem;left:-1rem;font-size:20rem;color:rgba(201,169,110,.04);font-family:'Cormorant Garamond',serif;line-height:1;pointer-events:none}
    .man-in{max-width:760px;margin:0 auto;position:relative}
    .man-q{font-family:'Cormorant Garamond',serif;font-size:clamp(1.6rem,4.5vw,2.4rem);font-style:italic;font-weight:300;line-height:1.45;color:var(--txs);margin-bottom:2.5rem}
    .man-q strong{color:var(--or);font-style:normal;font-weight:500}
    .man-b{font-size:1rem;color:var(--txm);line-height:1.85}
    .man-b p+p{margin-top:1.2rem}
    .man-b strong{color:var(--txs);font-weight:400}
    .sk-box{margin-top:2.5rem;padding:1.5rem 1.8rem;background:rgba(201,169,110,.06);border-left:3px solid var(--ord);border-radius:0 var(--rs) var(--rs) 0}
    .sk-lbl{font-size:.65rem;letter-spacing:.35em;text-transform:uppercase;color:var(--or);margin-bottom:.5rem}
    .sk-txt{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-style:italic;color:var(--txs);line-height:1.6}

    .sw{padding:7rem 1.5rem;max-width:1180px;margin:0 auto;position:relative}
    .sh{margin-bottom:3.5rem}
    .st{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,6vw,4.8rem);font-weight:400;line-height:1.05;margin-top:.6rem}
    .st em{color:var(--or);font-style:italic}

    .pg{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:1.5rem}
    .pc{background:var(--bdc);border:1px solid var(--bo);border-radius:var(--rc);padding:2.5rem 2rem 2rem;position:relative;overflow:hidden;transition:border-color var(--tr),transform var(--tr)}
    .pc:hover{border-color:var(--ord);transform:translateY(-5px)}
    .pc::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:linear-gradient(to right,transparent,var(--or),transparent);opacity:0;transition:opacity var(--tr)}
    .pc:hover::after{opacity:1}
    .pn{font-family:'Cormorant Garamond',serif;font-size:6rem;font-weight:300;color:rgba(201,169,110,.07);line-height:1;margin-bottom:-2rem;user-select:none}
    .pi{font-size:2rem;margin-bottom:1rem;display:block}
    .pt{font-family:'Cormorant Garamond',serif;font-size:1.9rem;color:var(--or);margin-bottom:.9rem}
    .pd{font-size:.93rem;color:var(--txm);line-height:1.75}

    .ew{padding:9rem 1.5rem;background:var(--bdp);position:relative;overflow:hidden}
    .ei{max-width:1100px;margin:0 auto;position:relative}
    .eg{display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:4rem}
    @media(max-width:700px){.eg{grid-template-columns:1fr}}
    .ec{background:var(--bdc);border:1px solid var(--bo);border-radius:var(--rc);padding:2.8rem 2.2rem;transition:border-color var(--tr)}
    .ec:hover{border-color:var(--ord)}
    .et{display:inline-block;border:1px solid var(--ord);border-radius:var(--rp);padding:.3rem 1rem;font-size:.66rem;letter-spacing:.28em;text-transform:uppercase;color:var(--or);margin-bottom:1.4rem}
    .en{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:400;color:var(--or);margin-bottom:1rem}
    .ed{font-size:.93rem;color:var(--txm);line-height:1.8}
    .eb{margin-top:1.8rem;padding:.9rem 1.1rem;background:rgba(201,169,110,.05);border-left:2px solid var(--ord);border-radius:0 var(--rs) var(--rs) 0;font-size:.84rem;color:var(--txm);font-style:italic;font-family:'Cormorant Garamond',serif}

    .cs{padding:10rem 1.5rem;text-align:center;position:relative;overflow:hidden}
    .cs::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(201,169,110,.07) 0%,transparent 65%);pointer-events:none}
    .cb2{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cormorant Garamond',serif;font-size:clamp(12rem,28vw,22rem);font-weight:300;color:rgba(201,169,110,.04);user-select:none;pointer-events:none;white-space:nowrap}
    .ci{position:relative;z-index:1}
    .ct{font-family:'Cormorant Garamond',serif;font-size:clamp(2.2rem,5.5vw,3.8rem);font-weight:400;line-height:1.2;margin-top:.8rem;margin-bottom:.8rem}
    .csu{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1.1rem,2.5vw,1.4rem);color:var(--txm);margin-bottom:2.8rem}

    footer{padding:3rem 1.5rem;text-align:center;border-top:1px solid var(--bo)}
    .fl{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--or);letter-spacing:.12em;margin-bottom:.6rem}
    footer p{font-size:.82rem;color:var(--txm);line-height:1.8}
    .dv{display:flex;align-items:center;gap:1.2rem;padding:2rem 1.5rem;max-width:700px;margin:0 auto}
    .dl{flex:1;height:1px;background:var(--bo)}
    .ds{color:var(--or);font-size:1rem;opacity:.5}

    .modal{position:fixed;inset:0;z-index:500;background:var(--bmd);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .4s ease}
    .modal.open{opacity:1;pointer-events:all}
    .qp{position:absolute;top:0;left:0;right:0;height:3px;background:rgba(201,169,110,.12);z-index:10}
    .qpf{height:100%;background:linear-gradient(to right,var(--or),var(--orl));transition:width .5s cubic-bezier(.4,0,.2,1);width:0%}
    .qh{display:flex;align-items:center;justify-content:space-between;padding:1.3rem 1.5rem 0;flex-shrink:0}
    .ql{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:var(--or);letter-spacing:.12em}
    .qx{width:34px;height:34px;border-radius:50%;background:transparent;border:1px solid var(--bo);color:var(--txm);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr)}
    .qx:hover{border-color:var(--ord);color:var(--or)}
    .qst{flex:1;position:relative;overflow:hidden}

    .step{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1.5rem 5rem;max-width:540px;margin:0 auto;width:100%;opacity:0;transform:translateX(55px);transition:opacity .38s cubic-bezier(.4,0,.2,1),transform .38s cubic-bezier(.4,0,.2,1);pointer-events:none;overflow-y:auto;scrollbar-width:none}
    .step::-webkit-scrollbar{display:none}
    .step.active{opacity:1;transform:translateX(0);pointer-events:all}
    .step.exit{opacity:0;transform:translateX(-55px)}
    .qq{font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,5vw,2.3rem);font-weight:400;line-height:1.3;text-align:center;margin-bottom:2rem;width:100%}
    .qhi{text-align:center;font-size:.76rem;color:var(--txm);margin-bottom:1rem;letter-spacing:.1em}
    .qi{width:100%;background:transparent;border:1.5px solid var(--bo);border-radius:var(--rs);padding:1rem 1.3rem;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:1rem;outline:none;transition:border-color var(--tr);margin-bottom:1.8rem}
    .qi:focus{border-color:var(--or)}
    .qi::placeholder{color:var(--txm)}
    textarea.qi{min-height:130px;resize:none;line-height:1.6}
    .ch{display:flex;flex-wrap:wrap;gap:.65rem;justify-content:center;margin-bottom:1.5rem;width:100%}
    .cb{padding:.72rem 1.15rem;background:transparent;border:1.5px solid var(--bo);border-radius:var(--rp);color:var(--txs);font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:300;cursor:pointer;transition:all var(--tr)}
    .cb:hover{border-color:var(--ord);color:var(--orl)}
    .cb.sel{border-color:var(--or);background:rgba(201,169,110,.12);color:var(--orl)}
    .qnw{position:absolute;bottom:0;left:0;right:0;padding:.8rem 1.5rem 1.2rem;background:linear-gradient(to top,var(--bmd) 55%,transparent);max-width:540px;margin:0 auto;width:100%}
    .qn{width:100%;padding:1rem 1.5rem;background:transparent;border:1.5px solid var(--ord);border-radius:var(--rp);color:var(--or);font-family:'DM Sans',sans-serif;font-size:.82rem;letter-spacing:.16em;text-transform:uppercase;cursor:pointer;transition:all var(--tr)}
    .qn:not(:disabled):hover{background:var(--or);color:var(--bg);border-color:var(--or)}
    .qn:disabled{opacity:.3;cursor:not-allowed}

    .pl{display:flex;flex-direction:column;gap:.85rem;margin-bottom:.8rem;width:100%}
    .pz{display:flex;align-items:center;gap:1rem;background:rgba(23,47,37,.6);border:1.5px dashed var(--bo);border-radius:var(--rs);padding:.9rem 1.1rem;cursor:pointer;transition:border-color var(--tr);position:relative;overflow:hidden}
    .pz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
    .pz:hover,.pz.done{border-style:solid;border-color:var(--ord)}
    .pth{width:56px;height:56px;border-radius:8px;background:rgba(201,169,110,.08);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;font-size:1.4rem}
    .pth img{width:100%;height:100%;object-fit:cover;display:none}
    .pth.loaded img{display:block}
    .pth.loaded .ti{display:none}
    .pin{flex:1}
    .ptt{font-size:.86rem;font-weight:500;color:var(--txs);margin-bottom:.2rem}
    .pds{font-size:.76rem;color:var(--txm);line-height:1.4}
    .pck{color:var(--ok);font-size:1.1rem;opacity:0;transition:opacity var(--tr)}
    .pz.done .pck{opacity:1}
    .pno{text-align:center;font-size:.78rem;color:var(--txm);margin-bottom:.3rem}

    .qld{position:absolute;inset:0;background:var(--bmd);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;opacity:0;pointer-events:none;transition:opacity .5s ease;z-index:5}
    .qld.active{opacity:1;pointer-events:all}
    .lg{font-size:3.5rem;color:var(--or);animation:lp 2.5s ease-in-out infinite;margin-bottom:2rem}
    @keyframes lp{0%,100%{opacity:.35;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
    .lm{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-style:italic;color:var(--txs);max-width:320px}
    .ls{margin-top:.8rem;font-size:.85rem;color:var(--txm);font-family:'Cormorant Garamond',serif;font-style:italic}
    .dots{display:flex;gap:.5rem;margin-top:2rem;justify-content:center}
    .dot{width:7px;height:7px;border-radius:50%;background:var(--or);animation:db 1.6s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.22s}.dot:nth-child(3){animation-delay:.44s}
    @keyframes db{0%,100%{opacity:.25;transform:scale(.85)}50%{opacity:1;transform:scale(1.2)}}

    .qr{position:absolute;inset:0;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .5s ease;z-index:4;scrollbar-width:none}
    .qr::-webkit-scrollbar{display:none}
    .qr.active{opacity:1;pointer-events:all}
    .rw{max-width:580px;margin:0 auto;padding:2rem 1.5rem 4rem}
    .rt{text-align:center;padding:2rem 0 1.5rem}
    .rg{font-size:2.8rem;color:var(--or);margin-bottom:.8rem;display:block}
    .rh{font-family:'Cormorant Garamond',serif;font-size:2.2rem;color:var(--or);margin-bottom:.3rem}
    .rb{font-size:.8rem;color:var(--txm);letter-spacing:.15em}
    .rhr{display:flex;align-items:center;gap:1rem;margin:1.5rem 0}
    .rhl{flex:1;height:1px;background:var(--bo)}
    .rhg{color:var(--or);font-size:.7rem}
    .snb{background:var(--bdc);border:1px solid var(--bo);border-radius:var(--rc);overflow:hidden;margin-bottom:.75rem}
    .snh{display:flex;align-items:center;gap:1rem;padding:1rem 1.3rem;border-bottom:1px solid var(--bo);background:rgba(201,169,110,.04)}
    .snn{width:28px;height:28px;border:1.5px solid var(--ord);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:.9rem;color:var(--or);flex-shrink:0}
    .snt{font-family:'Cormorant Garamond',serif;font-size:1.05rem;color:var(--txs)}
    .snc{padding:1.2rem 1.3rem;font-size:.9rem;line-height:1.8;color:var(--txs);white-space:pre-line}
    .rr{background:var(--bdc);border:1px solid var(--bo);border-radius:var(--rc);padding:1.5rem;font-size:.9rem;line-height:1.8;color:var(--txs);white-space:pre-line}

    .ebl{background:var(--bdp);border:1px solid var(--bo);border-radius:var(--rc);padding:2rem 1.5rem;text-align:center;margin-top:1.5rem}
    .ebdg{display:inline-block;background:rgba(201,169,110,.08);border:1px solid var(--ord);border-radius:var(--rp);padding:.35rem 1rem;font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;color:var(--or);margin-bottom:1rem}
    .eti{font-family:'Cormorant Garamond',serif;font-size:1.7rem;margin-bottom:.5rem}
    .esu{font-size:.88rem;color:var(--txm);margin-bottom:1.5rem;line-height:1.6}
    .sls{display:flex;gap:.65rem;justify-content:center;flex-wrap:wrap;margin-bottom:1.5rem}
    .sl{background:rgba(201,169,110,.05);border:1px solid var(--bo);border-radius:8px;padding:.55rem .9rem;font-size:.78rem;text-align:center}
    .sln{color:var(--or);display:block;font-weight:500;margin-bottom:.1rem}
    .slc{color:var(--txm);font-size:.72rem}
    .ef{display:flex;flex-direction:column;gap:.7rem;max-width:380px;margin:0 auto}
    .ei2,.esl{width:100%;background:transparent;border:1.5px solid var(--bo);border-radius:var(--rs);padding:.9rem 1.2rem;color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color var(--tr)}
    .ei2:focus,.esl:focus{border-color:var(--or)}
    .ei2::placeholder{color:var(--txm)}
    .esl{background:var(--bdc);cursor:pointer;appearance:none}
    .esl option{background:var(--bdc)}
    .bsub{width:100%;padding:1rem;background:linear-gradient(135deg,#c9a96e,#b8924a);color:#0F2922;font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;border:none;border-radius:var(--rp);cursor:pointer;transition:all var(--tr)}

          <h3 class="eti">Rejoins les 150 Pionniers</h3>
          <p class="esu">Les 150 premières personnes inscrites reçoivent un accès offert à l'agenda de soin personnalisé Sankhtuhair.</p>
          <div class="sls">
            <div class="sl"><span class="sln">✦ NHA</span><span class="slc">50 places</span></div>
            <div class="sl"><span class="sln">✦ TikTok</span><span class="slc">50 places</span></div>
            <div class="sl"><span class="sln">✦ Cercle Privé</span><span class="slc">50 places</span></div>
          </div>
          <div id="efw">
            <div class="ef">
              <input type="email" class="ei2" id="einp" placeholder="ton@email.com" autocomplete="email">
              <select class="esl" id="esel">
                <option value="" disabled selected>Comment tu nous as trouvé·e ?</option>
                <option value="NHA">✦ NHA — Natural Hair Academy</option>
                <option value="TikTok">✦ TikTok</option>
                <option value="Cercle Privé">✦ Cercle Privé (Proches)</option>
              </select>
              <button class="bsub" id="bsub">Rejoindre le Sanctuaire 👑</button>
            </div>
          </div>
          <div class="eok" id="eok"><div class="eoki">✨</div><p class="eokm" id="eokm">Ta couronne est enregistrée.<br>Bienvenue dans le Sanctuaire.</p></div>
        </div>
        <div style="height:2rem"></div>
      </div>
    </div>

  </div>
</div>

<script>
var cur=1,TOT=13,ans={},imgs={1:null,2:null,3:null};
var LM=[
  ['Seanamon étudie ta couronne...','Chaque fibre parle, elle écoute. 🌿'],
  ['Les ancêtres témoignent...','Le passé révèle ton avenir capillaire. ✨'],
  ["L'ordonnance prend forme...",'Précision d\'un labo, âme d\'un rituel. 🌱'],
  ['La révélation est presque prête...','Ta couronne mérite cette vérité. 👑💕']
];
var li=0,lt=null;

function openModal(){document.getElementById('modal').classList.add('open');document.body.style.overflow='hidden';}
function closeModal(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('btn-nav').onclick=openModal;
  document.getElementById('btn-hero').onclick=openModal;
  document.getElementById('btn-cta').onclick=openModal;
  document.getElementById('btn-close').onclick=closeModal;
  document.getElementById('bsub').onclick=doSub;
  document.getElementById('btn-submit').onclick=submitAll;
  document.getElementById('next1').onclick=goNext;
  document.getElementById('next12').onclick=goNext;

  // DELEGATION — tous les autres boutons Suivant
  document.getElementById('qst').addEventListener('click',function(e){
    var b=e.target.closest('.qn');
    if(b&&!b.disabled&&b.id!=='next1'&&b.id!=='next12'&&b.id!=='btn-submit'){
      goNext();
    }
  });

  document.getElementById('inp-prenom').addEventListener('input',function(e){
    document.getElementById('next1').disabled=!e.target.value.trim();
  });
  document.getElementById('inp-prenom').addEventListener('keydown',function(e){if(e.key==='Enter')goNext();});

  var io=new IntersectionObserver(function(en){en.forEach(function(e){if(e.isIntersecting)e.target.classList.add('in');});},{threshold:.1});
  document.querySelectorAll('.reveal,.stagger').forEach(function(el){io.observe(el);});
});

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});

function setProg(s){document.getElementById('prog').style.width=Math.round(((s-1)/TOT)*100)+'%';}

function goNext(){
  if(cur===1){var v=document.getElementById('inp-prenom').value.trim();if(!v)return;ans.prenom=v;}
  if(cur===12){ans.texte_libre=document.getElementById('inp-libre').value.trim();}
  var ce=document.getElementById('s'+cur),ne=document.getElementById('s'+(cur+1));
  if(!ne)return;
  ce.classList.remove('active');ce.classList.add('exit');
  setTimeout(function(){ce.classList.remove('exit');ne.classList.add('active');cur++;setProg(cur);ne.scrollTop=0;},350);
}

function pick(btn,field,multi){
  var grid=btn.closest('.ch');
  var nb=btn.closest('.step').querySelector('.qnw .qn');
  if(multi){
    btn.classList.toggle('sel');
    var sel=Array.from(grid.querySelectorAll('.cb.sel'));
    ans[field]=sel.map(function(b){return b.textContent.trim();});
    if(nb)nb.disabled=(sel.length===0);
  }else{
    grid.querySelectorAll('.cb').forEach(function(b){b.classList.remove('sel');});
    btn.classList.add('sel');
    ans[field]=btn.textContent.trim();
    if(nb)nb.disabled=false;
  }
}

function pCnt(){return Object.values(imgs).filter(Boolean).length;}

function onPhoto(e,n){
  var file=e.target.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(ev){
    imgs[n]=ev.target.result;
    document.getElementById('pi'+n).src=ev.target.result;
    document.getElementById('pt'+n).classList.add('loaded');
    document.getElementById('pz'+n).classList.add('done');
    var c=pCnt(),no=document.getElementById('pno');
    if(c===3){document.getElementById('btn-submit').disabled=false;no.textContent='3 photos ajoutées — Seanamon est prête ✨';no.style.color='var(--ok)';}
    else{no.textContent=c+'/3 photos — encore '+(3-c)+' photo'+(3-c>1?'s':'');}
  };
  r.readAsDataURL(file);
}

function buildMsg(){
  var a=ans,ar=function(v){return Array.isArray(v)?v.join(', '):(v||'N/A');};
  return 'Prénom : '+(a.prenom||'N/A')+'\nÂge : '+(a.age||'N/A')+'\nType couronne : '+(a.type_cheveux||'N/A')+'\nCuir chevelu : '+ar(a.cuir_chevelu)+'\nProblématiques : '+ar(a.problematiques)+'\nCause(s) : '+ar(a.cause)+'\nFréquence lavage : '+(a.frequence_lavage||'N/A')+'\nObjectifs : '+ar(a.objectifs)+'\nCoiffures protectrices : '+(a.coiffures_protectrices||'N/A')+'\nProduits naturels : '+(a.produits_naturels||'N/A')+'\nÀ écarter : '+ar(a.ecarter)+'\nMessage libre : '+(a.texte_libre||'Rien')+'\nPhotos : '+pCnt()+'\n\nAnalyse les photos pour identifier le type précis (Type 1-4, sous-types a/b/c) et construis le diagnostic complet.';
}

async function submitAll(){
  document.getElementById('s13').classList.remove('active');
  document.getElementById('qld').classList.add('active');
  document.getElementById('prog').style.width='100%';
  li=0;updL();lt=setInterval(function(){li=(li+1)%LM.length;updL();},3000);
  var content=[{type:'text',text:buildMsg()}];
  for(var i=1;i<=3;i++){if(imgs[i])content.push({type:'image_url',image_url:{url:imgs[i]}});}
  try{
    var r=await fetch('/api/diagnose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prenom:ans.prenom||'',content:content})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();showRes(d.result,ans.prenom||'');
  }catch(err){console.error(err);showRes('Seanamon est momentanément indisponible. Réessaie dans quelques instants. ✨',ans.prenom||'');}
}

function updL(){document.getElementById('lm').textContent=LM[li][0];document.getElementById('ls').textContent=LM[li][1];}

function showRes(text,prenom){
  clearInterval(lt);
  document.getElementById('qld').classList.remove('active');
  document.getElementById('rby').textContent='Diagnostic de '+prenom+' · par Seanamon';
  document.getElementById('rbody').innerHTML=parseSn(text);
  document.getElementById('qr').classList.add('active');
}

function parseSn(raw){
  var re=/(?:^|\n)(\d+)\.\s+([^\n:]+)\s*:\s*\n([\s\S]*?)(?=\n\d+\.|$)/g;
  var secs=[],m,t='\n'+raw;
  while((m=re.exec(t))!==null)secs.push({num:m[1],title:m[2].trim(),body:m[3].trim()});
  if(secs.length>=2)return secs.map(function(s){return '<div class="snb"><div class="snh"><div class="snn">'+s.num+'</div><div class="snt">'+s.title+'</div></div><div class="snc">'+esc(s.body)+'</div></div>';}).join('');
  return '<div class="rr">'+esc(raw)+'</div>';
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

async function doSub(){
  var email=document.getElementById('einp').value.trim();
  var cohorte=document.getElementById('esel').value;
  var prenom=ans.prenom||'';
  if(!email||!email.includes('@')){document.getElementById('einp').style.borderColor='#e57373';return;}
  if(!cohorte){document.getElementById('esel').style.borderColor='#e57373';return;}
  try{await fetch('/api/subscribe',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email,cohorte:cohorte,prenom:prenom})});}catch(e){}
  document.getElementById('efw').style.display='none';
  document.getElementById('eokm').innerHTML='Ta couronne est enregistrée, '+prenom+'.<br>Bienvenue dans le Sanctuaire. 👑';
  document.getElementById('eok').classList.add('show');
}

// MUSIC
var actx=null,mOn=false,mg=null;
document.getElementById('music-btn').addEventListener('click',function(){
  var btn=document.getElementById('music-btn');
  if(mOn){
    if(mg)mg.gain.setTargetAtTime(0,actx.currentTime,.5);
    setTimeout(function(){try{if(actx)actx.close();}catch(e){}actx=null;},1200);
    mOn=false;btn.textContent='🎵';
  }else{
    try{startAm();}catch(e){console.error(e);}
    mOn=true;btn.textContent='🔇';
  }
});

function startAm(){
  actx=new(window.AudioContext||window.webkitAudioContext)();
  actx.resume();
  mg=actx.createGain();mg.gain.setValueAtTime(0,actx.currentTime);mg.gain.linearRampToValueAtTime(.55,actx.currentTime+3);mg.connect(actx.destination);
  mkD(55,'sine',.07);mkD(110,'sine',.034);mkD(165,'triangle',.018);mkD(82.5,'sine',.024);
  mkNoise();schedP();
}
function mkD(f,t,v){
  var o=actx.createOscillator(),g=actx.createGain(),lfo=actx.createOscillator(),lg=actx.createGain();
  lfo.frequency.value=.05+Math.random()*.06;lg.gain.value=1.2;lfo.connect(lg);lg.connect(o.frequency);lfo.start();
  o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(mg);o.start();
}
function mkNoise(){
  var sz=actx.sampleRate*2,buf=actx.createBuffer(1,sz,actx.sampleRate),d=buf.getChannelData(0);
  for(var i=0;i<sz;i++)d[i]=(Math.random()*2-1);
  var src=actx.createBufferSource();src.buffer=buf;src.loop=true;
  var f=actx.createBiquadFilter();f.type='lowpass';f.frequency.value=160;
  var g=actx.createGain();g.gain.value=.01;
  src.connect(f);f.connect(g);g.connect(mg);src.start();
}
function schedP(){
  if(!actx||!mOn)return;
  var now=actx.currentTime,b=60/70;
 [[0,.22,80,.2],[b*.5,.1,140,.15],[b*1,.18,75,.2],[b*1.5,.08,160,.12],[b*2,.15,80,.18],[b*3,.1,130,.15],[b*3.5,.2,75,.22]].forEach(function(p){pDrm(now+p[0],p[2],p[1],p[3]);});
  setTimeout(function(){if(mOn&&actx)schedP();},b*4*1000);
}
function pDrm(w,f,v,d){
  if(!actx)return;
  var o=actx.createOscillator(),g=actx.createGain();
  o.frequency.setValueAtTime(f*1.6,w);o.frequency.exponentialRampToValueAtTime(f,w+.04);
  o.type='sine';g.gain.setValueAtTime(v,w);g.gain.exponentialRampToValueAtTime(.001,w+d);
  o.connect(g);g.connect(mg);o.start(w);o.stop(w+d+.02);
}
</script>
</body>
</html>
