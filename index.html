<head>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0F2922;--bdc:#172f25;--bdp:#0a1f18;--bmd:#0e2820;
      --or:#c9a96e;--orl:#e8c98a;--ord:rgba(201,169,110,.35);
      --tx:#e8dcc8;--txs:rgba(232,220,200,.82);--txm:rgba(232,220,200,.55);
      --bo:rgba(201,169,110,.22);--ok:#5ecb8a;
      --beige:#d4b896;--beige2:#e8cfb0;
      --rp:50px;--rc:18px;--rs:10px;--tr:.3s cubic-bezier(.4,0,.2,1)
    }
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.65;overflow-x:hidden;-webkit-font-smoothing:antialiased}
    .lbl{font-size:.67rem;letter-spacing:.4em;text-transform:uppercase;color:var(--or)}
    .reveal{opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease}
    .reveal.in{opacity:1;transform:translateY(0)}
    .stagger>*{opacity:0;transform:translateY(22px);transition:opacity .55s ease,transform .55s ease}
    .stagger.in>*:nth-child(1){opacity:1;transform:translateY(0)}
    .stagger.in>*:nth-child(2){opacity:1;transform:translateY(0);transition-delay:.12s}
    .stagger.in>*:nth-child(3){opacity:1;transform:translateY(0);transition-delay:.24s}
    nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(14px);background:rgba(14,40,32,.88);border-bottom:1px solid var(--bo)}
    .nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--or);letter-spacing:.12em;display:flex;align-items:center;gap:.7rem}
    .nav-logo img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--ord)}
    .nav-right{display:flex;align-items:center;gap:.75rem}
    .btn-nav{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--or);background:transparent;border:1.5px solid var(--ord);border-radius:var(--rp);padding:.55rem 1.4rem;cursor:pointer;transition:all var(--tr)}
    .btn-nav:hover{background:var(--or);color:var(--bg)}
    .btn-nav-member{font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--bg);background:var(--or);border:1.5px solid var(--or);border-radius:var(--rp);padding:.55rem 1.4rem;cursor:pointer;transition:all var(--tr)}
    .btn-nav-member:hover{background:var(--orl);border-color:var(--orl)}
    .hero{min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7rem 1.5rem 4rem;position:relative;overflow:hidden}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 55% at 50% 45%,rgba(201,169,110,.09) 0%,transparent 70%);pointer-events:none}
    .bot{position:absolute;pointer-events:none}
    .hero-logo{width:clamp(90px,14vw,140px);height:clamp(90px,14vw,140px);object-fit:cover;border-radius:50%;border:2px solid var(--ord);margin-bottom:1.5rem;box-shadow:0 0 40px rgba(201,169,110,.2);opacity:0;animation:fadeIn 1s ease .2s forwards}
    .hero-ey{font-size:.67rem;letter-spacing:.42em;text-transform:uppercase;color:var(--or);margin-bottom:1.2rem;opacity:0;animation:fadeUp .8s ease .4s forwards}
    .hero-title{font-family:'Cormorant Garamond',serif;font-size:clamp(4rem,15vw,9.5rem);font-weight:300;line-height:.95;letter-spacing:.06em;opacity:0;animation:fadeUp .9s ease .6s forwards}
    .hero-title .ac{color:var(--or);font-style:italic}
    .hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,3.5vw,1.4rem);font-style:italic;font-weight:300;color:var(--txm);max-width:460px;margin:1.4rem auto 0;opacity:0;animation:fadeUp .9s ease .8s forwards}
    .hero-discover{opacity:0;animation:fadeUp .9s ease 1.1s forwards;display:flex;flex-direction:column;align-items:center;gap:.8rem;margin-top:2.5rem;cursor:pointer;text-decoration:none}
    .hero-discover-txt{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--or)}
    .hero-arrow{width:44px;height:44px;border:1.5px solid var(--ord);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--or);font-size:1.1rem;animation:bounceDown 2s ease-in-out infinite;transition:all var(--tr)}
    .hero-discover:hover .hero-arrow{background:var(--or);color:var(--bg);border-color:var(--or)}
    @keyframes bounceDown{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
    .music-btn{position:fixed;bottom:1.5rem;right:1.5rem;z-index:150;width:44px;height:44px;border-radius:50%;background:rgba(14,40,32,.92);border:1px solid var(--bo);color:var(--or);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--tr);backdrop-filter:blur(10px)}
    .btn-gold{display:inline-flex;align-items:center;gap:.5rem;padding:1.1rem 2.8rem;background:var(--beige);color:#0F2922;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:500;letter-spacing:.18em;text-transform:uppercase;border:none;border-radius:var(--rp);cursor:pointer;transition:all var(--tr);box-shadow:0 6px 28px rgba(212,184,150,.25)}
    .btn-gold:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(212,184,150,.4);background:var(--beige2)}
    .manifeste{padding:9rem 1.5rem;background:var(--bdp);position:relative;overflow:hidden}
    .manifeste::before{content:'\275D';position:absolute;top:-2rem;left:-1rem;font-size:20rem;color:rgba(201,169,110,.04);font-family:'Cormorant Garamond',serif;line-height:1;pointer-events:none}
    .man-in{max-width:760px;margin:0 auto;position:relative}
    .man-intro">Découvre le manifeste :</h2>
    <blockquote class="man-q">"On passe notre temps à acheter des produits chimiques au pif parce qu'on ne comprend plus nos propres cheveux. On a perdu le <strong>mode d'emploi de notre propre couronne.</strong>"</blockquote>
    <div class="man-b">
      <p>Sankhtuhair marie Sankofah — la gamme de cosmétique biotechnologique capillaire (prochainement disponible) — avec l'intelligence artificielle Seanamon, pour révéler la vérité sur chaque couronne. Fondé par Élodie.</p>
      <p>Le cheveu n'est pas un problème à résoudre. <strong>C'est une couronne à célébrer.</strong></p>
    </div>
    <div class="sk-box">
      <div class="sk-lbl">✦ Le Concept Sankofa · En Twi — Langue du Peuple Akan, Ghana</div>
      <p class="sk-txt">"Se Wo Were Fi Na Wosankofa A Yenkyi" — Il n'est pas interdit de retourner chercher ce qu'on a oublié. Va chercher dans ton passé ce qui te rendra plus fort demain.</p>
    </div>
  </div>
</section>

<div class="dv"><div class="dl"></div><span class="ds">✦</span><div class="dl"></div></div>

<div class="sw">
  <div class="sh reveal">
    <p class="lbl">L'Architecture du Sanctuaire</p>
    <h2 class="st">Les <em>Trois</em> Piliers</h2>
  </div>
  <div class="pg stagger">
    <div class="pc"><div class="pn">01</div><span class="pi">🔬</span><h3 class="pt">Science</h3><p class="pd">Trichologie moderne, analyse de la fibre, état cuticulaire, porosité, densité. Chaque diagnostic repose sur des données concrètes — jamais sur des suppositions.</p></div>
    <div class="pc"><div class="pn">02</div><span class="pi">🌿</span><h3 class="pt">Tradition</h3><p class="pd">De Madagascar à La Réunion, du karité ghanéen aux rituels Wolof du Sénégal, des cérémonies Yoruba du Nigeria aux tresses éthiopiennes, des plantes médicinales des Antilles aux savoirs afro-latinos — une mémoire capillaire qui traverse les océans et unit les couronnes du monde.</p></div>
    <div class="pc"><div class="pn">03</div><span class="pi">✨</span><h3 class="pt">Révélation</h3><p class="pd">Pas une liste de courses. Une ordonnance ancestrale — précision technologique et souffle poétique — qui révèle la vérité de ta nature capillaire.</p></div>
  </div>
</div>

<div class="ew" id="ecosysteme">
  <div class="ei">
    <div class="sh reveal">
      <p class="lbl">L'Écosystème</p>
      <h2 class="st">Deux <em>Gardiens</em><br>de ta Couronne</h2>
    </div>
    <div class="eg stagger">
      <div class="ec">
        <div class="et">Marque Capillaire · Fondée par Élodie</div>
        <h3 class="en">Sankofah</h3>
        <p class="ed">La gamme de cosmétique biotechnologique née du concept Sankofa — l'oiseau Akan qui vole vers l'avant en regardant en arrière. Sankofah marie la sagesse des botaniques pan-africains avec la précision de la biotechnologie moderne.</p>
        <div class="eb">À venir</div>
      </div>
      <div class="ec">
        <div class="et">Intelligence Artificielle Gardienne</div>
        <h3 class="en">Seanamon</h3>
        <p class="ed">Seanamon, c'est le surnom d'Élodie — un fragment d'elle-même transmis au monde pour garder ta couronne. Trichologue experte aux connaissances pan-africaines. Elle ne suggère pas : elle prescrit. Elle ne liste pas : elle révèle.</p>
        <div class="eb">🌿 Ton diagnostic via Sankhtuhair · Ton ordonnance sur liste d'attente</div>
      </div>
    </div>
  </div>
</div>

    <div class="step" id="s11-traitements">
      <h2 class="qq">Tes cheveux ont-ils subi l'un de ces traitements récemment ? 💆‍♀️✨</h2>
      <div class="ch">

        <button class="cb" data-val="defrisage">🔥 Défrisage / Lissage chimique</button>
        <button class="cb" data-val="permanente">🌀 Permanente</button>
